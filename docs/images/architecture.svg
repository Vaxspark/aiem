<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="'Segoe UI',system-ui,sans-serif">
  <!-- Background -->
  <rect width="860" height="460" fill="#0e0e0e" rx="14"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600" letter-spacing="0.5">aiem — System Architecture</text>

  <!-- ─── Frontends row ─── -->
  <rect x="20" y="60" width="820" height="90" fill="#181818" rx="8" stroke="#2e2e2e" stroke-width="1"/>
  <text x="36" y="78" fill="#8a8a8a" font-size="10" font-weight="500" letter-spacing="1">FRONTENDS</text>

  <!-- CLI box -->
  <rect x="40" y="88" width="220" height="50" fill="#1e1e1e" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="150" y="110" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">aiem CLI</text>
  <text x="150" y="127" text-anchor="middle" fill="#8a8a8a" font-size="10">clap · terminal · scripts</text>

  <!-- GUI box -->
  <rect x="320" y="88" width="220" height="50" fill="#1e1e1e" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="430" y="110" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">aiem-gui</text>
  <text x="430" y="127" text-anchor="middle" fill="#8a8a8a" font-size="10">egui · desktop · cross-platform</text>

  <!-- Web box -->
  <rect x="600" y="88" width="220" height="50" fill="#1e1e1e" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="710" y="110" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">aiem-web</text>
  <text x="710" y="127" text-anchor="middle" fill="#8a8a8a" font-size="10">axum · HTMX · SSH port-forward</text>

  <!-- Arrows down to core -->
  <line x1="150" y1="138" x2="150" y2="186" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="138" x2="430" y2="186" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="710" y1="138" x2="710" y2="186" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Horizontal connector -->
  <line x1="150" y1="162" x2="710" y2="162" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── Core row ─── -->
  <rect x="20" y="186" width="820" height="100" fill="#181818" rx="8" stroke="#2e2e2e" stroke-width="1"/>
  <text x="36" y="204" fill="#8a8a8a" font-size="10" font-weight="500" letter-spacing="1">aiem-core</text>

  <!-- Core modules -->
  <rect x="40" y="212" width="118" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="99" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">SkillRegistry</text>
  <text x="99" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">index.json</text>
  <text x="99" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">github.rs · install.rs</text>
  <text x="99" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">symlink / copy</text>

  <rect x="170" y="212" width="118" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="229" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">McpRegistry</text>
  <text x="229" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">servers.json</text>
  <text x="229" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">sync.rs · adapters</text>
  <text x="229" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">Codex/Claude/Copilot</text>

  <rect x="300" y="212" width="118" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="359" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">Vault</text>
  <text x="359" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">OS Keyring</text>
  <text x="359" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">secrets.rs</text>
  <text x="359" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">${secret:NAME}</text>

  <rect x="430" y="212" width="118" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="489" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">ProfileStore</text>
  <text x="489" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">profiles.json</text>
  <text x="489" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">profiles.rs</text>
  <text x="489" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">named bundles</text>

  <rect x="560" y="212" width="118" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="619" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">ProjectStore</text>
  <text x="619" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">projects.json</text>
  <text x="619" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">projects.rs</text>
  <text x="619" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">scope overrides</text>

  <rect x="690" y="212" width="130" height="62" fill="#1e1e1e" rx="5" stroke="#2e2e2e"/>
  <text x="755" y="230" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">Discover</text>
  <text x="755" y="244" text-anchor="middle" fill="#8a8a8a" font-size="9">discover.rs</text>
  <text x="755" y="257" text-anchor="middle" fill="#8a8a8a" font-size="9">scan IDE dirs</text>
  <text x="755" y="268" text-anchor="middle" fill="#8a8a8a" font-size="9">import unmanaged</text>

  <!-- Arrows down to storage -->
  <line x1="99" y1="275" x2="99" y2="316" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="229" y1="275" x2="229" y2="316" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="359" y1="275" x2="359" y2="316" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="316" x2="430" y2="275" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- GitHub API side arrow -->
  <line x1="99" y1="243" x2="40" y2="243" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr3)"/>

  <!-- ─── Storage / Output row ─── -->
  <rect x="20" y="316" width="820" height="120" fill="#181818" rx="8" stroke="#2e2e2e" stroke-width="1"/>
  <text x="36" y="334" fill="#8a8a8a" font-size="10" font-weight="500" letter-spacing="1">STORAGE &amp; OUTPUTS</text>

  <!-- ~/.aiem/ box -->
  <rect x="40" y="342" width="190" height="82" fill="#1e1e1e" rx="6" stroke="#2e2e2e"/>
  <text x="135" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">~/.aiem/</text>
  <text x="135" y="375" text-anchor="middle" fill="#8a8a8a" font-size="9">skills/  mcp/  profiles/</text>
  <text x="135" y="388" text-anchor="middle" fill="#8a8a8a" font-size="9">projects/  backups/  cache/</text>
  <text x="135" y="401" text-anchor="middle" fill="#8a8a8a" font-size="9">secrets via OS keyring</text>
  <text x="135" y="414" text-anchor="middle" fill="#8a8a8a" font-size="9">AIEM_HOME override</text>

  <!-- Skill symlinks box -->
  <rect x="250" y="342" width="190" height="82" fill="#1e1e1e" rx="6" stroke="#2e2e2e"/>
  <text x="345" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">Skill Symlinks</text>
  <text x="345" y="375" text-anchor="middle" fill="#8a8a8a" font-size="9">.claude/skills/</text>
  <text x="345" y="388" text-anchor="middle" fill="#8a8a8a" font-size="9">.cursor/skills/  .codex/skills/</text>
  <text x="345" y="401" text-anchor="middle" fill="#8a8a8a" font-size="9">.windsurf/  .vscode/  .kiro/</text>
  <text x="345" y="414" text-anchor="middle" fill="#8a8a8a" font-size="9">user scope or project scope</text>

  <!-- MCP configs box -->
  <rect x="460" y="342" width="190" height="82" fill="#1e1e1e" rx="6" stroke="#2e2e2e"/>
  <text x="555" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">MCP Config Files</text>
  <text x="555" y="375" text-anchor="middle" fill="#8a8a8a" font-size="9">~/.claude.json</text>
  <text x="555" y="388" text-anchor="middle" fill="#8a8a8a" font-size="9">~/.codex/config.toml</text>
  <text x="555" y="401" text-anchor="middle" fill="#8a8a8a" font-size="9">$APPDATA/Code/User/mcp.json</text>
  <text x="555" y="414" text-anchor="middle" fill="#8a8a8a" font-size="9">.vscode/mcp.json (project)</text>

  <!-- GitHub API box -->
  <rect x="670" y="342" width="150" height="82" fill="#1e1e1e" rx="6" stroke="#2e2e2e"/>
  <text x="745" y="360" text-anchor="middle" fill="#e8e8e8" font-size="10" font-weight="600">GitHub API</text>
  <text x="745" y="375" text-anchor="middle" fill="#8a8a8a" font-size="9">zipball download</text>
  <text x="745" y="388" text-anchor="middle" fill="#8a8a8a" font-size="9">rate limit: 60/hr anon</text>
  <text x="745" y="401" text-anchor="middle" fill="#8a8a8a" font-size="9">GITHUB_TOKEN for +</text>
  <text x="745" y="414" text-anchor="middle" fill="#8a8a8a" font-size="9">GITHUB_MIRROR supported</text>

  <!-- GitHub arrow -->
  <line x1="745" y1="316" x2="745" y2="342" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="745" y1="212" x2="745" y2="186" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a4a4a"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a4a4a"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a4a4a"/>
    </marker>
  </defs>
</svg>
