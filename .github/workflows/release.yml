name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""          # default (web) + build aiem-gui separately
            build_gui: true

          - name: linux-x86_64-musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bins: aiem
            features: ""
            build_gui: false       # GUI (egui/wgpu) not supported on musl

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bins: aiem.exe aiem-gui.exe
            features: ""
            build_gui: true

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""
            build_gui: true

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""
            build_gui: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux GUI build deps
        if: matrix.os == 'ubuntu-22.04' && matrix.build_gui
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev pkg-config

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build aiem (CLI + Web)
        run: cargo build --release --target ${{ matrix.target }} -p aiem-cli

      - name: Build aiem-gui
        if: matrix.build_gui
        run: cargo build --release --target ${{ matrix.target }} -p aiem-gui

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          PKG="aiem-${TAG}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          for b in ${{ matrix.bins }}; do
            cp "target/${{ matrix.target }}/release/${b}" "dist/${PKG}/"
          done
          cp README.md LICENSE "dist/${PKG}/"
          cp -r docs "dist/${PKG}/docs" || true
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          ( cd dist && shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256" )

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { '${{ github.event.inputs.tag }}' }
          $pkg = "aiem-$tag-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          foreach ($b in @('aiem.exe','aiem-gui.exe')) {
            Copy-Item "target/${{ matrix.target }}/release/$b" "dist/$pkg/"
          }
          Copy-Item README.md,LICENSE "dist/$pkg/"
          if (Test-Path docs) { Copy-Item -Recurse docs "dist/$pkg/docs" }
          Compress-Archive -Path "dist/$pkg/*" -DestinationPath "dist/$pkg.zip"
          (Get-FileHash "dist/$pkg.zip" -Algorithm SHA256).Hash | Out-File "dist/$pkg.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/aiem-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aiem-*
          generate_release_notes: true
