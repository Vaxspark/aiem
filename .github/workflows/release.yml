name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true

  build:
    needs: ensure-release
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""          # default (web) + build aiem-gui separately
            build_gui: true

          - name: linux-x86_64-musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bins: aiem
            features: ""
            build_gui: false       # GUI (egui/wgpu) not supported on musl

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bins: aiem.exe aiem-gui.exe
            features: ""
            build_gui: true

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""
            build_gui: true

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bins: aiem aiem-gui
            features: ""
            build_gui: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux GUI build deps
        if: matrix.os == 'ubuntu-22.04' && matrix.build_gui
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev pkg-config

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build aiem (CLI + Web)
        run: cargo build --release --target ${{ matrix.target }} -p aiem-cli

      - name: Build aiem-gui
        if: matrix.build_gui
        run: cargo build --release --target ${{ matrix.target }} -p aiem-gui

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          PKG="aiem-${TAG}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          for b in ${{ matrix.bins }}; do
            cp "target/${{ matrix.target }}/release/${b}" "dist/${PKG}/"
          done
          cp README.md LICENSE "dist/${PKG}/"
          cp -r pic "dist/${PKG}/pic" || true
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          ( cd dist && shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256" )

      - name: Package Debian installer
        if: matrix.name == 'linux-x86_64-gnu'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          PKG="aiem-${TAG}-${{ matrix.name }}"
          ROOT="dist/debroot-${{ matrix.name }}"
          rm -rf "${ROOT}"
          mkdir -p \
            "${ROOT}/DEBIAN" \
            "${ROOT}/usr/bin" \
            "${ROOT}/usr/share/applications" \
            "${ROOT}/usr/share/doc/aiem" \
            "${ROOT}/usr/share/icons/hicolor/256x256/apps"
          cp "target/${{ matrix.target }}/release/aiem" "${ROOT}/usr/bin/aiem"
          cp "target/${{ matrix.target }}/release/aiem-gui" "${ROOT}/usr/bin/aiem-gui"
          chmod 0755 "${ROOT}/usr/bin/aiem" "${ROOT}/usr/bin/aiem-gui"
          cp README.md LICENSE "${ROOT}/usr/share/doc/aiem/"
          cp packaging/linux/aiem.desktop "${ROOT}/usr/share/applications/aiem.desktop"
          cp pic/aiem-256.png "${ROOT}/usr/share/icons/hicolor/256x256/apps/aiem.png"
          cat > "${ROOT}/DEBIAN/control" <<EOF
          Package: aiem
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: aiem contributors <noreply@github.com>
          Homepage: https://github.com/Vaxspark/aiem
          Depends: libc6, libgcc-s1, ca-certificates, libxkbcommon0, libxkbcommon-x11-0, libwayland-client0, libxcb1, libxcb-render0, libxcb-shape0, libxcb-xfixes0, libgtk-3-0
          Description: AI Extension Manager
           Manage AI skills, MCP servers, project profiles, secrets, and backups.
          EOF
          sed -i 's/^          //' "${ROOT}/DEBIAN/control"
          dpkg-deb --build "${ROOT}" "dist/${PKG}.deb"
          ( cd dist && sha256sum "${PKG}.deb" > "${PKG}.deb.sha256" )

      - name: Package macOS installer
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          PKG="aiem-${TAG}-${{ matrix.name }}"
          ROOT="dist/pkgroot-${{ matrix.name }}"
          APP="${ROOT}/Applications/aiem.app"
          rm -rf "${ROOT}"
          mkdir -p \
            "${APP}/Contents/MacOS" \
            "${APP}/Contents/Resources" \
            "${ROOT}/usr/local/bin" \
            "${ROOT}/usr/local/share/aiem"
          cp "target/${{ matrix.target }}/release/aiem" "${ROOT}/usr/local/bin/aiem"
          cp "target/${{ matrix.target }}/release/aiem-gui" "${ROOT}/usr/local/bin/aiem-gui"
          cp "target/${{ matrix.target }}/release/aiem-gui" "${APP}/Contents/MacOS/aiem-gui"
          chmod 0755 "${ROOT}/usr/local/bin/aiem" "${ROOT}/usr/local/bin/aiem-gui" "${APP}/Contents/MacOS/aiem-gui"
          cp README.md LICENSE "${ROOT}/usr/local/share/aiem/"
          cp -R pic "${ROOT}/usr/local/share/aiem/pic"
          cat > "${APP}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>
            <string>aiem</string>
            <key>CFBundleExecutable</key>
            <string>aiem-gui</string>
            <key>CFBundleIconFile</key>
            <string>aiem</string>
            <key>CFBundleIdentifier</key>
            <string>com.vaxspark.aiem</string>
            <key>CFBundleName</key>
            <string>aiem</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
          </dict>
          </plist>
          EOF
          sed -i '' 's/^          //' "${APP}/Contents/Info.plist"
          ICONSET="dist/aiem.iconset"
          rm -rf "${ICONSET}"
          mkdir -p "${ICONSET}"
          sips -z 16 16 pic/aiem.png --out "${ICONSET}/icon_16x16.png" >/dev/null
          sips -z 32 32 pic/aiem.png --out "${ICONSET}/icon_16x16@2x.png" >/dev/null
          sips -z 32 32 pic/aiem.png --out "${ICONSET}/icon_32x32.png" >/dev/null
          sips -z 64 64 pic/aiem.png --out "${ICONSET}/icon_32x32@2x.png" >/dev/null
          sips -z 128 128 pic/aiem.png --out "${ICONSET}/icon_128x128.png" >/dev/null
          sips -z 256 256 pic/aiem.png --out "${ICONSET}/icon_128x128@2x.png" >/dev/null
          sips -z 256 256 pic/aiem.png --out "${ICONSET}/icon_256x256.png" >/dev/null
          sips -z 512 512 pic/aiem.png --out "${ICONSET}/icon_256x256@2x.png" >/dev/null
          sips -z 512 512 pic/aiem.png --out "${ICONSET}/icon_512x512.png" >/dev/null
          sips -z 1024 1024 pic/aiem.png --out "${ICONSET}/icon_512x512@2x.png" >/dev/null
          iconutil -c icns "${ICONSET}" -o "${APP}/Contents/Resources/aiem.icns"
          pkgbuild \
            --root "${ROOT}" \
            --identifier "com.vaxspark.aiem" \
            --version "${VERSION}" \
            --install-location "/" \
            "dist/${PKG}.pkg"
          ( cd dist && shasum -a 256 "${PKG}.pkg" > "${PKG}.pkg.sha256" )

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $pkg = "aiem-$tag-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          foreach ($b in @('aiem.exe','aiem-gui.exe')) {
            Copy-Item "target/${{ matrix.target }}/release/$b" "dist/$pkg/"
          }
          Copy-Item pic/aiem.ico "dist/$pkg/aiem.ico"
          Copy-Item README.md,LICENSE "dist/$pkg/"
          Copy-Item -Recurse pic "dist/$pkg/pic"
          Set-Content -Path "dist/$pkg/Launch aiem GUI.cmd" -Encoding ascii -Value '@echo off', 'start "" "%~dp0aiem-gui.exe"'
          Set-Content -Path "dist/$pkg/Launch aiem Web UI.cmd" -Encoding ascii -Value '@echo off', '"%~dp0aiem.exe" serve --host 127.0.0.1 --port 8787 --open', 'pause'
          Compress-Archive -Path "dist/$pkg/*" -DestinationPath "dist/$pkg.zip"
          (Get-FileHash "dist/$pkg.zip" -Algorithm SHA256).Hash | Out-File "dist/$pkg.zip.sha256" -Encoding ascii

      - name: Install Inno Setup
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows setup installer
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag.TrimStart('v')
          $pkg = "aiem-$tag-${{ matrix.name }}"
          $env:AIEM_VERSION = $version
          $env:AIEM_PACKAGE_DIR = (Resolve-Path "dist/$pkg").Path
          $env:AIEM_OUTPUT_DIR = (Resolve-Path "dist").Path
          $env:AIEM_OUTPUT_BASE = "$pkg-setup"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "packaging/windows/aiem.iss"
          (Get-FileHash "dist/$pkg-setup.exe" -Algorithm SHA256).Hash | Out-File "dist/$pkg-setup.exe.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/aiem-*

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/aiem-*
          overwrite_files: true
